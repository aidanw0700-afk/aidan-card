<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aidan White - Finance & AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0F1419 0%, #1a1f2e 100%);
            color: #e0e6ed;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: rgba(20, 25, 35, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(74, 158, 255, 0.15);
            border-radius: 16px;
            padding: 40px 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .header {
            text-align: center;
            margin-bottom: 36px;
        }

        .name {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ffffff 0%, #e0e6ed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .title {
            font-size: 14px;
            color: #4a9eff;
            font-weight: 500;
            margin-bottom: 4px;
            letter-spacing: 0.3px;
        }

        .subtitle {
            font-size: 13px;
            color: #a8b2c1;
            font-weight: 400;
            line-height: 1.5;
        }

        .divider {
            width: 32px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #4a9eff, transparent);
            margin: 20px auto;
        }

        .actions {
            display: grid;
            gap: 12px;
            margin-bottom: 32px;
        }

        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 16px;
            background: rgba(74, 158, 255, 0.1);
            border: 1px solid rgba(74, 158, 255, 0.25);
            border-radius: 10px;
            color: #e0e6ed;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 10px;
        }

        .action-btn:hover {
            background: rgba(74, 158, 255, 0.2);
            border-color: rgba(74, 158, 255, 0.4);
            transform: translateY(-2px);
        }

        .action-btn:active {
            transform: translateY(0);
        }

        .action-icon {
            font-size: 16px;
            opacity: 0.8;
        }

        .linkedin-btn {
            background: rgba(0, 119, 181, 0.15);
            border: 1px solid rgba(0, 119, 181, 0.3);
        }

        .linkedin-btn:hover {
            background: rgba(0, 119, 181, 0.25);
            border-color: rgba(0, 119, 181, 0.5);
        }

        .info-section {
            border-top: 1px solid rgba(74, 158, 255, 0.1);
            padding-top: 24px;
        }

        .info-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 16px;
            font-size: 13px;
        }

        .info-row:last-child {
            margin-bottom: 0;
        }

        .info-icon {
            color: #4a9eff;
            font-weight: 600;
            min-width: 16px;
            opacity: 0.8;
        }

        .info-content {
            color: #a8b2c1;
            word-break: break-word;
            line-height: 1.4;
        }

        .info-content a {
            color: #4a9eff;
            text-decoration: none;
            transition: color 0.2s;
        }

        .info-content a:hover {
            color: #5fa7ff;
        }

        @media (max-width: 480px) {
            .container {
                padding: 32px 24px;
                border-radius: 12px;
            }

            .name {
                font-size: 24px;
            }

            .action-btn {
                padding: 12px 14px;
                font-size: 13px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .action-btn {
                transition: none;
            }

            .action-btn:hover {
                transform: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="name">Aidan White</div>
            <div class="title">Finance Major</div>
            <div class="subtitle">minoring in AI Applications</div>
            <div class="divider"></div>
            <div class="subtitle">FAU • Boca Raton, FL</div>
        </div>

        <div class="actions">
            <a href="tel:+19412240986" class="action-btn">
                <span class="action-icon">📞</span>
                <span>Call</span>
            </a>
            <a href="mailto:whitea2025@fau.edu" class="action-btn">
                <span class="action-icon">✉️</span>
                <span>Email</span>
            </a>
            <a href="sms:+19412240986" class="action-btn">
                <span class="action-icon">💬</span>
                <span>Text</span>
            </a>
            <a href="https://www.linkedin.com/in/aidan-white1/" class="action-btn linkedin-btn" target="_blank" rel="noopener">
                <span class="action-icon">in</span>
                <span>LinkedIn</span>
            </a>
        </div>

        <div class="info-section">
            <div class="info-row">
                <div class="info-icon">📧</div>
                <div class="info-content"><a href="mailto:whitea2025@fau.edu">whitea2025@fau.edu</a></div>
            </div>
            <div class="info-row">
                <div class="info-icon">📱</div>
                <div class="info-content"><a href="tel:+19412240986">941-224-0986</a></div>
            </div>
            <div class="info-row">
                <div class="info-icon">🔗</div>
                <div class="info-content"><a href="https://www.linkedin.com/in/aidan-white1/" target="_blank">LinkedIn Profile</a></div>
            </div>
        </div>
    </div>
</body>
</html>
