<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect with Aidan White</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0F1419 0%, #1a1f2e 100%);
            color: #e0e6ed;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: rgba(20, 25, 35, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(74, 158, 255, 0.15);
            border-radius: 16px;
            padding: 40px 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ffffff 0%, #e0e6ed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-subtitle {
            font-size: 13px;
            color: #a8b2c1;
            font-weight: 400;
        }

        .divider {
            width: 32px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #4a9eff, transparent);
            margin: 16px auto;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group:last-of-type {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #4a9eff;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(74, 158, 255, 0.08);
            border: 1px solid rgba(74, 158, 255, 0.25);
            border-radius: 10px;
            color: #e0e6ed;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: #6b7280;
        }

        input:focus {
            outline: none;
            background: rgba(74, 158, 255, 0.12);
            border-color: rgba(74, 158, 255, 0.4);
            box-shadow: 0 0 0 3px rgba(74, 158, 255, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 14px 16px;
            background: linear-gradient(135deg, #4a9eff 0%, #357abd 100%);
            border: none;
            border-radius: 10px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 24px;
            letter-spacing: 0.3px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(74, 158, 255, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .success-message {
            display: none;
            text-align: center;
            padding: 24px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 10px;
            color: #86efac;
            font-size: 14px;
            margin-top: 16px;
        }

        .error-message {
            display: none;
            text-align: center;
            padding: 12px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            color: #fca5a5;
            font-size: 13px;
            margin-top: 12px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 32px 24px;
                border-radius: 12px;
            }

            .header-title {
                font-size: 20px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            input, .submit-btn {
                transition: none;
            }

            .submit-btn:hover {
                transform: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">Let's Connect</div>
            <div class="header-subtitle">Share your contact info</div>
            <div class="divider"></div>
        </div>

        <form id="contactForm">
            <div class="form-group">
                <label for="name">Full Name *</label>
                <input 
                    type="text" 
                    id="name" 
                    name="name" 
                    placeholder="John Doe" 
                    required
                />
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="john@example.com" 
                    required
                />
            </div>

            <div class="form-group">
                <label for="phone">Phone Number *</label>
                <input 
                    type="tel" 
                    id="phone" 
                    name="phone" 
                    placeholder="(555) 123-4567" 
                    required
                />
            </div>

            <div class="form-group">
                <label for="linkedin">LinkedIn Profile</label>
                <input 
                    type="url" 
                    id="linkedin" 
                    name="linkedin" 
                    placeholder="https://linkedin.com/in/yourprofile" 
                />
            </div>

            <button type="submit" class="submit-btn">Send My Contact Info</button>

            <div class="success-message" id="successMessage">
                ✓ Thanks! Your contact info has been sent.
            </div>

            <div class="error-message" id="errorMessage"></div>
        </form>
    </div>

    <script>
        const form = document.getElementById('contactForm');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');
        const submitBtn = form.querySelector('button[type="submit"]');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(form);
            const data = {
                name: formData.get('name'),
                email: formData.get('email'),
                phone: formData.get('phone'),
                linkedin: formData.get('linkedin'),
                timestamp: new Date().toLocaleString()
            };

            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';
            errorMessage.style.display = 'none';

            try {
                // Replace SCRIPT_URL with your Google Apps Script deployment URL
                const response = await fetch('https://script.google.com/macros/s/AKfycbzvIiiPHH81O_gJnTtDqwNhPBfpgf7cSqOvkW-CFJO0sPD5a3187E3PNlz6Hz64X6XCVA/exec', {
                    method: 'POST',
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    successMessage.style.display = 'block';
                    form.reset();
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Send My Contact Info';
                    
                    // Hide success message after 5 seconds
                    setTimeout(() => {
                        successMessage.style.display = 'none';
                    }, 5000);
                } else {
                    throw new Error('Submission failed');
                }
            } catch (error) {
                errorMessage.textContent = 'Something went wrong. Please try again.';
                errorMessage.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send My Contact Info';
            }
        });
    </script>
</body>
</html>
